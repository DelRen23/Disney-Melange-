<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disney Mélange !</title>
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/disney-castle.png">
    <link rel="icon" href="https://img.icons8.com/color/512/disney-castle.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            color: #333; 
            overflow: hidden;
        }
        .card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            width: 85%; 
            max-width: 400px; 
            text-align: center; 
        }
        h1 { color: #1a73e8; margin-bottom: 5px; font-size: 26px; }
        .scrambled { 
            font-size: 32px; 
            font-weight: bold; 
            letter-spacing: 4px; 
            color: #d93025; 
            margin: 25px 0; 
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        input { 
            padding: 15px; 
            font-size: 18px; 
            border: 2px solid #ddd; 
            border-radius: 12px; 
            width: 100%; 
            box-sizing: border-box; 
            outline: none; 
            text-align: center;
            transition: 0.3s; 
        }
        input:focus { border-color: #1a73e8; box-shadow: 0 0 8px rgba(26,115,232,0.3); }
        button { 
            padding: 15px; 
            font-size: 18px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-top: 20px; 
            width: 100%; 
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:active { transform: scale(0.98); }
        .message { margin-top: 20px; font-weight: bold; height: 24px; font-size: 18px; }
        .score-board { margin-top: 25px; font-size: 16px; color: #555; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>Disney Mélange 🏰</h1>
    <p>Déchiffre le nom caché :</p>
    <div id="wordDisplay" class="scrambled">----</div>
    <input type="text" id="userInput" placeholder="Ecris ici..." autocomplete="off" spellcheck="false">
    <button onclick="checkAnswer()">VÉRIFIER</button>
    <div id="feedback" class="message"></div>
    <div class="score-board">✨ Score : <span id="score">0</span> ✨</div>
</div>

<script>
    const movies = ["VAIANA", "CENDRILLON", "RAIPONCE", "ALADDIN", "MOWGLI", "BAMBI", "DUMBO", "PINOCCHIO", "MULAN", "TARZAN", "RATATOUILLE", "LUCA", "ENCANTO", "HERCULE", "POCOHONTAS", "REINE DES NEIGES", "LILO ET STITCH", "LE ROI LION"];
    let currentWord = "";
    let score = 0;

    function scramble(word) {
        let cleanWord = word.replace(/\s/g, ''); // Enlève les espaces pour le mélange
        let letters = cleanWord.split('');
        for (let i = letters.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [letters[i], letters[j]] = [letters[j], letters[i]];
        }
        let res = letters.join('');
        return res === cleanWord ? scramble(word) : res;
    }

    function nextWord() {
        currentWord = movies[Math.floor(Math.random() * movies.length)];
        document.getElementById('wordDisplay').innerText = scramble(currentWord);
        document.getElementById('userInput').value = "";
        document.getElementById('feedback').innerText = "";
    }

    function checkAnswer() {
        const userVal = document.getElementById('userInput').value.toUpperCase().replace(/\s/g, '').trim();
        const targetVal = currentWord.replace(/\s/g, '');
        
        if (userVal === targetVal) {
            score++;
            document.getElementById('score').innerText = score;
            document.getElementById('feedback').style.color = "#34a853";
            document.getElementById('feedback').innerText = "Bravo ! 🎉";
            setTimeout(nextWord, 1200);
        } else {
            document.getElementById('feedback').style.color = "#d93025";
            document.getElementById('feedback').innerText = "Presque ! Réessaie ❌";
        }
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });
    nextWord();
</script>
</body>
</html>
