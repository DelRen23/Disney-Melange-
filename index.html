<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIFINI - Le Quiz Musical</title>
    <style>
        :root { --bg: #0b0e14; --card: #1a1f29; --accent: #1DB954; --error: #ff4444; --text: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Menu de Sélection */
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 90%; max-width: 400px; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 10px; letter-spacing: -2px; color: var(--accent); }
        .tagline { margin-bottom: 30px; opacity: 0.7; }
        .cat-btn { width: 100%; padding: 20px; margin: 10px 0; border-radius: 15px; border: none; background: var(--card); color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; border: 1px solid #333; }
        .cat-btn:active { transform: scale(0.95); background: var(--accent); }

        /* Interface Jeu */
        #game-ui { display: none; width: 90%; max-width: 400px; margin-top: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .lives { color: var(--error); font-size: 1.4rem; letter-spacing: 3px; }
        .streak-info { text-align: left; }
        .streak-count { font-size: 1.5rem; color: var(--accent); font-weight: bold; }

        .quiz-card { background: var(--card); padding: 40px 25px; border-radius: 25px; border: 1px solid #333; margin-bottom: 30px; min-height: 100px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; text-align: center; line-height: 1.4; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; }
        .btn-opt { background: #2a303c; color: white; border: 2px solid transparent; padding: 18px; border-radius: 18px; cursor: pointer; font-size: 1rem; transition: all 0.2s; outline: none; -webkit-tap-highlight-color: transparent; font-weight: 500; }
        
        /* Animations et États */
        .correct { background: var(--accent) !important; border-color: white !important; animation: pop 0.3s; }
        .wrong { background: var(--error) !important; border-color: white !important; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Game Over */
        #game-over { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .btn-restart { background: var(--accent); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; font-size: 1.2rem; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>KIFINI</h1>
        <p class="tagline">Complète les paroles sans faire d'erreur !</p>
        <button class="cat-btn" onclick="startGame('disney')">🏰 DISNEY</button>
        <button class="cat-btn" onclick="startGame('80s')">🎸 ANNÉES 80 / 90</button>
        <button class="cat-btn" onclick="startGame('modern')">🎧 POP & RAP FR</button>
    </div>

    <div id="game-ui">
        <div class="header">
            <div class="streak-info">SÉRIE<br><span id="current-streak" class="streak-count">0</span></div>
            <div class="lives" id="hearts">❤️❤️❤️</div>
        </div>
        <div class="quiz-card" id="question-text">...</div>
        <div class="options-grid" id="options-container"></div>
    </div>

    <div id="game-over">
        <h2 style="font-size: 3rem; color: var(--error); margin: 0;">FIN</h2>
        <p style="font-size: 1.2rem; opacity: 0.8;">Ta meilleure série de mots :</p>
        <div id="final-score" style="font-size: 4rem; font-weight: bold; color: var(--accent);">0</div>
        <button class="btn-restart" onclick="backToMenu()">MENU PRINCIPAL</button>
    </div>

<script>
    const allData = {
        disney: [
            { q: "Libérée, délivrée, je ne mentirai plus...", opts: ["Jamais", "Du tout", "Ici-bas", "Désormais"], a: 0 },
            { q: "Sous l'océan, doudou c'est bien mieux...", opts: ["Tout en bas", "Tout là-bas", "Tout bas", "Sans les bras"], a: 2 },
            { q: "Il en faut peu pour être heureux, vraiment très peu pour...", opts: ["S'en satisfaire", "Être heureux", "Vivre au mieux", "Partir à deux"], a: 0 },
            { q: "Ce rêve bleu, je n'y crois pas c'est...", opts: ["Un délice", "Merveilleux", "Trop soyeux", "Si mystérieux"], a: 1 },
            { q: "Hakuna Matata, mais quel chant...", opts: ["Incroyable", "Formidable", "Génial", "Inoubliable"], a: 2 },
            { q: "Je voudrais déjà être...", opts: ["Le plus grand", "Roi", "Un homme", "Libre"], a: 1 },
            { q: "L'histoire de la vie, le cycle...", opts: ["Éternel", "Infini", "Sans fin", "Des saisons"], a: 0 },
            { q: "Tu t'envoles, tu t'envoles, tu...", opts: ["T'envoles", "T'enfuis", "T'élèves", "T'en vas"], a: 0 },
            { q: "Si je n'ai pas d'ami, j'ai pas...", opts: ["D'ennuis", "De vie", "De joie", "De soucis"], a: 3 },
            { q: "Parce que moi je suis un Aristochat, un...", opts: ["Vrai chat", "Chat de race", "Aristocrate", "Vrai de vrai"], a: 3 },
            { q: "C'est la fête, c'est la fête, service...", opts: ["De tête", "De fête", "Garantie", "Complet"], a: 3 },
            { q: "Je suis ton...", opts: ["Compagnon", "Meilleur pote", "Ami", "Jouet"], a: 2 },
            { q: "Rien qu'un petit d'homme, un drôle de...", opts: ["Phénomène", "Petit singe", "Spécimen", "Animal"], a: 2 },
            { q: "L'air du vent, tu l'as jamais...", opts: ["Entendu", "Écouté", "Compris", "Chanté"], a: 0 },
            { q: "Jamais je n'avais eu d'ami...", opts: ["Comme lui", "Aussi fou", "Si grand", "De génie"], a: 0 }
        ],
        '80s': [
            { q: "On va s'aimer, à toucher...", opts: ["Le ciel", "Les étoiles", "Le soleil", "La lune"], a: 1 },
            { q: "Femme libérée, c'est pas si facile...", opts: ["De l'aimer", "À trouver", "À porter", "À gérer"], a: 3 },
            { q: "Besoin de rien, envie de...", opts: ["Toi", "Rien", "Partir", "Tout"], a: 0 },
            { q: "Partir un jour, sans...", opts: ["Bagages", "Regrets", "Se retourner", "Dire au revoir"], a: 1 },
            { q: "Quand la musique est...", opts: ["Forte", "Bonne", "Là", "Belle"], a: 1 },
            { q: "Nuit de folie, au bout de la...", opts: ["Route", "Nuit", "Vie", "Pluie"], a: 1 },
            { q: "Pour le plaisir, de ne plus...", opts: ["Partir", "Savoir", "Vouloir", "Penser"], a: 3 },
            { q: "Début de soirée, la nuit est...", opts: ["Belle", "Jeune", "À nous", "Chaude"], a: 1 },
            { q: "Banana split, le baiser au...", opts: ["Chocolat", "Sucre", "Curacao", "Cacao"], a: 2 },
            { q: "T'as le look...", opts: ["Coco", "Catin", "Canon", "Câlin"], a: 0 },
            { q: "Allumez le...", opts: ["Moteur", "Feu", "Soleil", "Cœur"], a: 1 },
            { q: "Les démons de minuit, m'entraînent au bout de la...", opts: ["Nuit", "Peur", "Vie", "Folie"], a: 1 },
            { q: "Joe le taxi, y va pas...", opts: ["Vite", "Partout", "Nulle part", "Au garage"], a: 1 },
            { q: "Mistral gagnant, s'asseoir sur un...", opts: ["Banc", "Mur", "Pneu", "Fauteuil"], a: 1 },
            { q: "Mistral gagnant, regarder le temps qui...", opts: ["Passe", "Court", "S'arrête", "S'en va"], a: 3 }
        ],
        modern: [
            { q: "Au DD, j'suis dans la...", opts: ["Cité", "Course", "Légende", "Merde"], a: 2 },
            { q: "Djadja, y a pas moyen...", opts: ["Djadja", "De rire", "De partir", "De dormir"], a: 0 },
            { q: "Ramenez la coupe à la...", opts: ["Cité", "Maison", "France", "Victoire"], a: 1 },
            { q: "Bande organisée, personne peut nous...", opts: ["Arrêter", "Toucher", "Caner", "Tester"], a: 2 },
            { q: "Sapés comme...", opts: ["Jamais", "Des rois", "Luffy", "Des cracks"], a: 0 },
            { q: "Dommage, dommage, c'est peut-être la dernière...", opts: ["Chance", "Fois", "Danse", "Parole"], a: 1 },
            { q: "Papaoutai, dis-moi où est ton...", opts: ["Père", "Papa", "Cœur", "Esprit"], a: 1 },
            { q: "On fait la fête, on fait la...", opts: ["Guerre", "Zumba", "Moula", "Bagarrre"], a: 2 },
            { q: "Angela, m'a tapé dans l'...", opts: ["Dos", "Ventre", "Bras", "Oeil"], a: 3 },
            { q: "Validée, j'ai tout...", opts: ["Gagné", "Validé", "Oublié", "Donné"], a: 1 },
            { q: "Tout oublier, il faudrait tout...", opts: ["Casser", "Effacer", "Recommencer", "Oublier"], a: 3 },
            { q: "Bella, elle répondait au nom de...", opts: ["Bella", "Maria", "Celia", "Inconnue"], a: 0 },
            { q: "J'me tire, me demande pas...", opts: ["Pourquoi", "L'heure", "Où je vais", "Si ça va"], a: 0 },
            { q: "Basique, simple, simple...", opts: ["Basique", "Vrai", "Simple", "Direct"], a: 0 },
            { q: "T'étais la plus belle de la...", opts: ["Ville", "Classe", "Tess", "Zone"], a: 2 }
        ]
    };

    let currentList = [];
    let lives = 3;
    let streak = 0;
    let lastQIndex = -1;

    function startGame(cat) {
        currentList = [...allData[cat]]; // Copie de la liste
        lives = 3;
        streak = 0;
        updateHearts();
        document.getElementById('current-streak').innerText = streak;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        // Anti-doublon simple
        let randomIndex;
        do {
            randomIndex = Math.floor(Math.random() * currentList.length);
        } while (randomIndex === lastQIndex && currentList.length > 1);
        
        lastQIndex = randomIndex;
        const qData = currentList[randomIndex];

        document.getElementById('question-text').innerText = qData.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        qData.opts.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-opt';
            btn.innerText = text;
            btn.onclick = () => check(i, qData.a, btn);
            container.appendChild(btn);
        });
    }

    function check(clicked, correct, btn) {
        const btns = document.querySelectorAll('.btn-opt');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if(clicked === correct) {
            btn.classList.add('correct');
            streak++;
            document.getElementById('current-streak').innerText = streak;
            setTimeout(loadQuestion, 800);
        } else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
            lives--;
            updateHearts();
            if(lives <= 0) {
                setTimeout(endGame, 1000);
            } else {
                setTimeout(loadQuestion, 1500);
            }
        }
    }

    function updateHearts() {
        document.getElementById('hearts').innerText = "❤️".repeat(lives) + "🖤".repeat(3-lives);
    }

    function endGame() {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('game-over').style.display = 'flex';
        document.getElementById('final-score').innerText = streak;
    }

    function backToMenu() {
        document.getElementById('game-over').style.display = 'none';
        document.getElementById('menu').style.display = 'flex';
    }
</script>
</body>
</html>
